<!DOCTYPE html>
<html>
<head>
    <title>Pagos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>💰 Pagos</h2>

<div class="container">
<input id="clientePago" placeholder="Nombre cliente">

<select id="membresia" onchange="actualizarMonto()">
    <option value="">Selecciona membresía</option>
    <option value="150">Semana</option>
    <option value="280">Quincena</option>
    <option value="550">Mes</option>
    <option value="400">Mes Team</option>
    <option value="390">Mes Estudiante</option>
</select>

<input id="monto" placeholder="Monto" readonly>

<select id="metodo">
    <option>Efectivo</option>
    <option>Transferencia</option>
</select>

<button onclick="registrarPago()">Registrar Pago</button>

<button onclick="location.href='index.html'">⬅ Volver</button>

</div>

<script src="script.js"></script>
</body>
</html>
